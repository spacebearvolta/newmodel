<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Organization admin — Grain</title>
<link rel="icon" href="assets/grain-logo.png">
<meta name="ext-resource-dependency" content="assets/grain-logo.png" data-resource-id="grainLogo" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="orgadmin/orgadmin.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0f1115">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0f1115"/>
    <g fill="none" stroke="#1FAB6B" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="600" cy="340" r="70"/>
      <path d="M470 560a130 130 0 0 1 260 0"/>
    </g>
    <rect x="540" y="470" width="120" height="120" rx="24" fill="#0f1115"/>
    <path d="M600 470l54 31v62l-54 31-54-31v-62z" fill="none" stroke="#1FAB6B" stroke-width="16" stroke-linejoin="round"/>
    <path d="M600 502l27 16v32l-27 16-27-16v-32z" fill="#1FAB6B"/>
  </svg>
</template>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="orgadmin/Primitives.jsx"></script>
<script type="text/babel" src="orgadmin/ShareSettings.jsx"></script>
<script type="text/babel" src="orgadmin/FallbackNotification.jsx"></script>
<script type="text/babel" src="orgadmin/MyMeetingsNew.jsx"></script>
<script type="text/babel" src="orgadmin/OrgAdminSidebar.jsx"></script>
<script type="text/babel" src="orgadmin/OrgAdminTeam.jsx"></script>
<script type="text/babel" src="orgadmin/OrgAdminGeneral.jsx"></script>

<script type="text/babel">
const ORG_ADMIN_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "wrapInMacChrome": true,
  "persona": "creator",
  "hasMeetings": false,
  "mcpFirstMeetingBanner": false,
  "trialOver": false
}/*EDITMODE-END*/;

// Map each sidebar id to its page title + icon (used for stub pages).
const PAGE_META = {
  general:    { title: 'General',    icon: 'settings' },
  meetings:   { title: 'Meetings',   icon: 'video' },
  members:    { title: 'Members',    icon: 'users' },
  teams:      { title: 'Teams',      icon: 'users-round' },
  templates:  { title: 'Templates',  icon: 'file-text' },
  scorecards: { title: 'Scorecards', icon: 'clipboard-list' },
  trackers:   { title: 'Trackers',   icon: 'tag' },
  billing:    { title: 'Billing',    icon: 'credit-card' },
  plans:      { title: 'Plans',      icon: 'arrow-up-circle' },
  mcp:        { title: 'MCP Clients', icon: 'terminal-square' },
  api:        { title: 'API',         icon: 'code-2' },
  hubspot:    { title: 'HubSpot',     icon: 'plug' },
  slack:      { title: 'Slack',       icon: 'plug' },
  aircall:    { title: 'Aircall',     icon: 'phone' },
  salesforce: { title: 'Salesforce',  icon: 'cloud' },
  zapier:     { title: 'Zapier',      icon: 'zap' },
};

function App() {
  const [t, setT] = useTweaks(ORG_ADMIN_DEFAULTS);
  const [active, setActive] = React.useState('general');

  React.useEffect(() => {
    document.body.classList.toggle('density-compact', t.density === 'compact');
  }, [t.density]);

  // Lucide redraws every render — required as new icons mount with state.
  React.useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  });

  let page;
  if (active === 'general') {
    page = <OrgAdminGeneral />;
  } else if (active === 'meetings') {
    // Mirror the My Meetings content here so org admins see the same
    // capture/share/recap controls as workspace defaults.
    page = <MyMeetingsNew showDiff={false} showArtboard={false} orgAdmin={true} />;
  } else if (active && active.startsWith('team-')) {
    page = <OrgAdminTeam team={ORG_TEAMS.find((tm) => tm.id === active)} />;
  } else {
    page = <OrgAdminStub title={PAGE_META[active]?.title || active} icon={PAGE_META[active]?.icon} />;
  }

  const teamMeta = ORG_TEAMS.find((tm) => tm.id === active);
  const screenLabel = `Organization admin — ${teamMeta ? teamMeta.label : (PAGE_META[active]?.title || active)}`;

  const inner = (
    <div className="gr-app" style={{ height: '100%', minHeight: 0 }}>
      <OrgAdminSidebar active={active} onNav={setActive} />
      <main className="gr-main">
        <div key={active} data-screen-label={screenLabel}>
          {page}
        </div>
      </main>
    </div>
  );

  return (
    <>
      {t.wrapInMacChrome ? (
        <div className="mac-shell">
          <div className="mac-shell__window">
            <div className="mac-titlebar">
              <div className="mac-traffic"><span /><span /><span /></div>
              <div className="mac-titlebar__title">Organization admin — Grain</div>
            </div>
            <div className="mac-body">{inner}</div>
          </div>
        </div>
      ) : (
        <div style={{ minHeight: '100vh' }}>{inner}</div>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Presentation">
          <TweakRadio
            label="Density"
            value={t.density}
            onChange={(v) => setT('density', v)}
            options={[
              { value: 'comfortable', label: 'Cozy' },
              { value: 'compact', label: 'Compact' },
            ]}
          />
          <TweakToggle
            label="Mac chrome"
            value={t.wrapInMacChrome}
            onChange={(v) => setT('wrapInMacChrome', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
