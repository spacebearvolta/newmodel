<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Our Meetings — Settings</title>
<link rel="icon" href="/projects/a149191c-6a9a-4ef7-91e2-af51ef13d640/assets/grain-logo.png">
<link rel="stylesheet" href="app.css">
<link rel="stylesheet" href="settings.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="ShareSettings.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="MemberPreview.jsx"></script>
<script type="text/babel" src="RichSelect.jsx"></script>
<script type="text/babel" src="MemberModal.jsx"></script>
<script type="text/babel" src="OurMeetings.jsx"></script>

<script type="text/babel">
const OUR_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showDiff": true,
  "density": "comfortable",
  "wrapInMacChrome": true,
  "view": "before"
}/*EDITMODE-END*/;

function App() {
  const [t, setT] = useTweaks(OUR_DEFAULTS);
  const [openMember, setOpenMember] = React.useState(null);

  React.useEffect(() => {
    document.body.classList.toggle('hide-diff', !t.showDiff);
    document.body.classList.toggle('density-compact', t.density === 'compact');
  }, [t.showDiff, t.density]);

  // Listen for View clicks from MemberPreview
  React.useEffect(() => {
    const onView = (e) => {
      const id = e.detail && e.detail.memberId;
      const member = window.MEMBERS && window.MEMBERS.find((x) => x.id === id);
      if (member) setOpenMember(member);
    };
    window.addEventListener('grain:view-member', onView);
    return () => window.removeEventListener('grain:view-member', onView);
  }, []);

  React.useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  });

  const inner = (
    <div className="gr-app" style={{ height: '100%', minHeight: 0 }}>
      <Sidebar active="our-meetings" onNav={() => {}} />
      <main className="gr-main">
        <div data-screen-label="Our Meetings — workspace defaults">
          <OurMeetings showDiff={t.showDiff} />
        </div>
      </main>
    </div>
  );

  return (
    <>
      {t.wrapInMacChrome ? (
        <div className="mac-shell">
          <div className="mac-shell__window">
            <div className="mac-titlebar">
              <div className="mac-traffic"><span /><span /><span /></div>
              <div className="mac-titlebar__title">Settings — Grain</div>
            </div>
            <div className="mac-body">{inner}</div>
          </div>
        </div>
      ) : (
        <div style={{ minHeight: '100vh' }}>{inner}</div>
      )}

      {openMember && (
        <MemberSettingsModal member={openMember} onClose={() => setOpenMember(null)} />
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="View">
          <TweakToggle
            label="Diff flags"
            value={t.showDiff}
            onChange={(v) => setT('showDiff', v)}
          />
        </TweakSection>
        <TweakSection label="Presentation">
          <TweakRadio
            label="Density"
            value={t.density}
            onChange={(v) => setT('density', v)}
            options={[
              { value: 'comfortable', label: 'Cozy' },
              { value: 'compact', label: 'Compact' },
            ]}
          />
          <TweakToggle
            label="Mac chrome"
            value={t.wrapInMacChrome}
            onChange={(v) => setT('wrapInMacChrome', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
