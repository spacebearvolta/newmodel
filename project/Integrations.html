<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Integrations — Grain</title>
<link rel="icon" href="assets/grain-logo.png">
<link rel="stylesheet" href="app.css">
<link rel="stylesheet" href="settings.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>

<style>
/* macOS chrome (mirrors the other settings pages) */
html, body, #root { height: 100%; }
body { margin: 0; }
.mac-body > .intg-app { flex: 1; min-height: 0; overflow: hidden; }
.mac-body .intg-mainwrap { overflow-y: auto; }

/* ── Integrations page layout ───────────────────────────────────────── */
.intg-app { display: flex; height: 100%; min-height: 0; background: var(--bg-1); }
.intg-side {
  width: 248px; flex-shrink: 0; border-right: 1px solid var(--border);
  background: var(--bg-0); padding: 12px 10px; overflow-y: auto;
}
.intg-side__head { padding: 4px 4px 8px; }
.intg-back {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--fg-3); font-size: 13px; padding: 8px 10px; border-radius: 8px;
  text-decoration: none; transition: background var(--dur-fast);
}
.intg-back:hover { background: var(--bg-2); }
.intg-back i { width: 14px; height: 14px; }
.intg-nav { padding-bottom: 12px; }
.intg-group { margin-top: 12px; }
.intg-group:first-child { margin-top: 4px; }
.intg-groupTitle {
  font-size: 11px; color: var(--fg-6); text-transform: uppercase;
  letter-spacing: 0.06em; padding: 6px 10px; font-weight: 600;
}
.intg-item {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 7px 10px; border: 0; background: none; border-radius: 8px;
  color: var(--fg-2); font: inherit; font-size: 13px; text-align: left;
  cursor: pointer; transition: background var(--dur-fast);
}
.intg-item:hover { background: var(--bg-1); }
.intg-item.is-active { background: var(--bg-2); color: var(--fg-1); font-weight: 500; }
.intg-item i { width: 16px; height: 16px; flex-shrink: 0; color: var(--fg-4); }
.intg-item.is-active i { color: var(--fg-2); }
.intg-brand {
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 4px; color: #fff; font-weight: 700; flex-shrink: 0;
}

.intg-mainwrap { flex: 1; min-width: 0; overflow-y: auto; background: var(--bg-1); }
.intg-breadcrumb { padding: 20px 28px 0; font-size: 14px; color: var(--fg-4); }
.intg-center {
  display: flex; align-items: center; justify-content: center;
  padding: 72px 24px; min-height: calc(100% - 44px);
}

/* Centered upgrade / connect card */
.intg-card {
  width: 560px; max-width: 100%;
  background: var(--bg-0); border: 1px solid var(--border);
  border-radius: 16px; padding: 38px 44px; text-align: center;
  box-shadow: 0 1px 2px rgba(16,40,30,.04), 0 8px 24px rgba(16,40,30,.06);
}
.intg-card__logo {
  width: 44px; height: 44px; border-radius: 12px; margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 22px;
}
.intg-card__logo--neutral { background: var(--bg-2) !important; color: var(--fg-2); }
.intg-card__title { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.01em; }
.intg-card__desc { font-size: 15px; color: var(--fg-5); line-height: 1.6; margin: 0 auto 26px; max-width: 420px; text-wrap: pretty; }
.intg-card__actions { display: flex; align-items: center; justify-content: center; gap: 16px; }
.intg-card__learn { color: var(--grain-green-600); font-weight: 600; font-size: 14px; cursor: pointer; text-decoration: none; }
.intg-card__learn:hover { text-decoration: underline; }
.intg-card__note { font-size: 12.5px; color: var(--fg-6); margin: 22px 0 0; }
.intg-card__eyebrow {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; color: var(--grain-green-600); margin-bottom: 14px;
}
.intg-card__eyebrow i { width: 13px; height: 13px; }
.intg-values { list-style: none; margin: 24px auto 0; padding: 0; max-width: 340px; text-align: left; display: flex; flex-direction: column; gap: 11px; }
.intg-values li { display: flex; align-items: center; gap: 11px; font-size: 13.5px; color: var(--fg-2); }
.intg-values__icon { width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--success-bg); color: #0B6F3F; }
.intg-values__icon i { width: 15px; height: 15px; }
.intg-card .intg-card__actions { margin-top: 26px; }
.intg-card--placeholder { color: var(--fg-5); }
.intg-trial-chip {
  display: inline-flex; align-items: center; gap: 8px;
  margin: 0 auto; padding: 9px 14px; border-radius: 999px;
  background: #F3F0FF; border: 1px solid #DDD3FB; color: #4A2FA8;
  font-size: 12.5px; font-weight: 500; max-width: 440px; text-align: left;
}
.intg-trial-chip i { width: 14px; height: 14px; color: #6D45E8; flex-shrink: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="IntegrationsSettings.jsx"></script>

<script type="text/babel">
const DEFAULTS = /*EDITMODE-BEGIN*/{
  "plan": "free",
  "integration": "hubspot",
  "wrapInMacChrome": true
}/*EDITMODE-END*/;

function App() {
  const [t, setT] = useTweaks(DEFAULTS);

  React.useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  });

  const startTrial = () => { window.location.href = 'Meetings.html?app'; };

  const inner = (
    <IntegrationsSettings plan={t.plan} initial={t.integration} onStartTrial={startTrial} />
  );

  return (
    <>
      {t.wrapInMacChrome ? (
        <div className="mac-shell">
          <div className="mac-shell__window">
            <div className="mac-titlebar">
              <div className="mac-traffic"><span /><span /><span /></div>
              <div className="mac-titlebar__title">Settings — Grain</div>
            </div>
            <div className="mac-body">{inner}</div>
          </div>
        </div>
      ) : (
        <div style={{ height: '100vh' }}>{inner}</div>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="State">
          <TweakRadio
            label="Plan"
            value={t.plan}
            onChange={(v) => setT('plan', v)}
            options={[
              { value: 'free', label: 'Free' },
              { value: 'business', label: 'Business' },
            ]}
          />
          <TweakSelect
            label="Integration"
            value={t.integration}
            onChange={(v) => setT('integration', v)}
            options={[
              { value: 'hubspot', label: 'HubSpot' },
              { value: 'salesforce', label: 'Salesforce' },
              { value: 'zoom', label: 'Zoom' },
              { value: 'slack', label: 'Slack' },
              { value: 'aircall', label: 'Aircall' },
              { value: 'productboard', label: 'Productboard' },
              { value: 'zapier', label: 'Zapier' },
              { value: 'mcp', label: 'MCP Clients' },
              { value: 'api', label: 'API' },
            ]}
          />
        </TweakSection>
        <TweakSection label="Presentation">
          <TweakToggle
            label="Mac chrome"
            value={t.wrapInMacChrome}
            onChange={(v) => setT('wrapInMacChrome', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
