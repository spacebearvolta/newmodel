<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Grain</title>
<link rel="icon" href="assets/grain-logo.png">
<link rel="stylesheet" href="app.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>

<style>
/* ==========================================================
   Main app shell — re-creates the post-login Grain UI shell.
   Lives in its own file (Settings dropdown.html) so the
   settings prototype can navigate "back to app" into it.
   Class prefix `ga-` ("Grain App") keeps these styles cleanly
   separated from the settings `set-*` / `gr-*` namespaces.
   ========================================================== */

body { margin: 0; background: #FCFBF8; font-family: var(--font-sans); color: var(--fg-1); }

.ga-shell { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

/* ── Sidebar ───────────────────────────────────────────── */
.ga-side {
  background: #F7F6F2;
  border-right: 1px solid var(--border);
  padding: 16px 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
}

/* Workspace switcher button */
.ga-ws {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 10px;
  background: transparent;
  border: 0;
  cursor: pointer;
  width: 100%;
  text-align: left;
  font: inherit;
  color: inherit;
  transition: background var(--dur-fast);
}
.ga-ws:hover { background: rgba(0,0,0,.04); }
.ga-ws__logo {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  flex-shrink: 0;
  background-image: url("assets/grain-logo.png");
  background-size: cover;
  background-position: center;
  box-shadow: 0 1px 2px rgba(0,0,0,.08);
}
.ga-ws__text { flex: 1; min-width: 0; line-height: 1.2; }
.ga-ws__name { font-size: 15px; font-weight: 600; color: var(--fg-1); }
.ga-ws__user { font-size: 13px; color: var(--fg-5); margin-top: 1px; }
.ga-ws__chev { color: var(--fg-4); flex-shrink: 0; transition: transform var(--dur-fast); }
.ga-ws__chev svg { width: 16px; height: 16px; display: block; }
.ga-ws.is-open .ga-ws__chev { transform: rotate(180deg); }

/* Nav */
.ga-nav { display: flex; flex-direction: column; gap: 2px; }
.ga-nav__item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--fg-2);
  cursor: pointer;
  border: 0;
  background: transparent;
  width: 100%;
  text-align: left;
  font-family: inherit;
  transition: background var(--dur-fast), color var(--dur-fast);
}
.ga-nav__item:hover { background: rgba(0,0,0,.04); color: var(--fg-1); }
.ga-nav__item.is-active { background: #111; color: #fff; }
.ga-nav__item.is-active:hover { background: #111; }
.ga-nav__item svg { width: 18px; height: 18px; flex-shrink: 0; }

/* Pushes the MCP card to the bottom */
.ga-spacer { flex: 1; }

/* MCP card */
.ga-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 14px 16px;
  background: #fff;
}
.ga-card__thumb {
  position: relative;
  background: var(--bg-1);
  border-radius: 8px;
  padding: 14px 14px 12px;
  margin-bottom: 12px;
}
.ga-card__thumb__line {
  height: 6px;
  border-radius: 3px;
  background: #E6E4DD;
  margin-bottom: 6px;
}
.ga-card__thumb__line:nth-child(1) { width: 70%; }
.ga-card__thumb__line:nth-child(2) { width: 90%; }
.ga-card__thumb__line:nth-child(3) { width: 60%; margin-bottom: 0; }
.ga-card__sparkle {
  position: absolute;
  right: -6px;
  bottom: -6px;
  width: 18px;
  height: 18px;
  color: var(--grain-green-500);
}
.ga-card__title { font-size: 14px; font-weight: 600; color: var(--fg-1); margin: 0 0 4px; }
.ga-card__desc { font-size: 13px; color: var(--fg-5); margin: 0; line-height: 1.45; }

/* Bottom action row (Invite + help) */
.ga-foot { display: flex; align-items: center; gap: 8px; }
.ga-invite {
  flex: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: #111;
  color: #fff;
  border: 0;
  border-radius: 10px;
  padding: 11px 16px;
  font: 500 14px/1 var(--font-sans);
  cursor: pointer;
  transition: background var(--dur-fast);
}
.ga-invite:hover { background: #000; }
.ga-invite svg { width: 16px; height: 16px; }
.ga-help {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--fg-4);
  cursor: pointer;
}
.ga-help:hover { background: rgba(0,0,0,.04); color: var(--fg-2); }
.ga-help svg { width: 16px; height: 16px; }

/* ── Dropdown menu ────────────────────────────────────── */
.ga-menu {
  position: absolute;
  top: 64px;
  left: 12px;
  width: 296px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 6px;
  box-shadow: 0 12px 32px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
  z-index: 20;
}
.ga-menu__item {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 9px 10px;
  border-radius: 8px;
  border: 0;
  background: transparent;
  font: 500 14px/1.2 var(--font-sans);
  color: var(--fg-1);
  cursor: pointer;
  text-align: left;
  text-decoration: none;
  transition: background var(--dur-fast);
}
.ga-menu__item:hover { background: rgba(0,0,0,.05); }
.ga-menu__item > span { white-space: nowrap; }
.ga-menu__item svg { width: 18px; height: 18px; color: var(--fg-3); flex-shrink: 0; }
.ga-menu__item.is-danger { color: #D6422C; }
.ga-menu__item.is-danger svg { color: #D6422C; }
.ga-menu__divider { height: 1px; background: var(--border); margin: 4px 4px; }

/* Trial CTA sitting at the end of a menu row */
.ga-menu__trial {
  margin-left: auto;
  background: #4F6BFF;
  color: #fff;
  border: 0;
  border-radius: 8px;
  padding: 6px 12px;
  font: 600 12px/1 var(--font-sans);
  letter-spacing: .01em;
  cursor: pointer;
  transition: background var(--dur-fast);
}
.ga-menu__trial:hover { background: #3D58E8; }

/* ── Canvas (right side) ──────────────────────────────── */
.ga-canvas { background: #FCFBF8; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
function App() {
  const [open, setOpen] = React.useState(false);
  const menuRef = React.useRef(null);
  const btnRef = React.useRef(null);

  // Close on outside click / Esc
  React.useEffect(() => {
    if (!open) return;
    const onDoc = (e) => {
      if (
        menuRef.current && !menuRef.current.contains(e.target) &&
        btnRef.current && !btnRef.current.contains(e.target)
      ) setOpen(false);
    };
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('mousedown', onDoc);
      document.removeEventListener('keydown', onKey);
    };
  }, [open]);

  React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  const navItems = [
    { id: 'search',   icon: 'search',   label: 'Search'   },
    { id: 'updates',  icon: 'bell',     label: 'Updates'  },
    { id: 'meetings', icon: 'video',    label: 'Meetings', active: true },
    { id: 'projects', icon: 'folder',   label: 'Projects' },
    { id: 'stories',  icon: 'play-square', label: 'Stories' },
    { id: 'coaching', icon: 'megaphone',  label: 'Coaching' },
  ];

  return (
    <div className="ga-shell" data-screen-label="Grain app — Settings menu open">
      <aside className="ga-side">
        <button
          ref={btnRef}
          className={`ga-ws ${open ? 'is-open' : ''}`}
          type="button"
          onClick={() => setOpen((o) => !o)}
          aria-expanded={open}
          aria-haspopup="menu"
        >
          <span className="ga-ws__logo" aria-hidden="true" />
          <span className="ga-ws__text">
            <div className="ga-ws__name">Grain</div>
            <div className="ga-ws__user">Jeff Whitlock</div>
          </span>
          <span className="ga-ws__chev"><i data-lucide="chevron-down" /></span>
        </button>

        {open && (
          <div ref={menuRef} className="ga-menu" role="menu">
            <a
              className="ga-menu__item"
              role="menuitem"
              href="My Meetings Settings Reorg.html"
            >
              <i data-lucide="settings" />
              <span>Settings</span>
            </a>
            <div className="ga-menu__item" role="menuitem">
              <i data-lucide="wrench" />
              <span>Organization settings</span>
              <button
                type="button"
                className="ga-menu__trial"
                onClick={(e) => e.stopPropagation()}
              >
                Start trial
              </button>
            </div>
            <div className="ga-menu__divider" />
            <button className="ga-menu__item is-danger" role="menuitem" type="button">
              <i data-lucide="log-out" />
              <span>Sign out</span>
            </button>
          </div>
        )}

        <nav className="ga-nav" aria-label="Primary">
          {navItems.map((n) => (
            <button
              key={n.id}
              type="button"
              className={`ga-nav__item ${n.active ? 'is-active' : ''}`}
              aria-current={n.active ? 'page' : undefined}
            >
              <i data-lucide={n.icon} />
              <span>{n.label}</span>
            </button>
          ))}
        </nav>

        <div className="ga-spacer" />

        <div className="ga-card">
          <div className="ga-card__thumb">
            <div className="ga-card__thumb__line" />
            <div className="ga-card__thumb__line" />
            <div className="ga-card__thumb__line" />
            <svg className="ga-card__sparkle" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2l1.6 4.8L18 8l-4.4 1.2L12 14l-1.6-4.8L6 8l4.4-1.2L12 2zm6 11l.9 2.6 2.6.9-2.6.9L18 20l-.9-2.6-2.6-.9 2.6-.9.9-2.6z" />
            </svg>
          </div>
          <p className="ga-card__title">Use the Grain MCP</p>
          <p className="ga-card__desc">Work with your meetings directly in Claude.</p>
        </div>

        <div className="ga-foot">
          <button className="ga-invite" type="button">
            <i data-lucide="plus" />
            <span>Invite</span>
          </button>
          <button className="ga-help" type="button" aria-label="Help">
            <i data-lucide="circle-help" />
          </button>
        </div>
      </aside>

      <main className="ga-canvas" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
