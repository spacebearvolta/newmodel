<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Desktop notifications — Grain</title>
<link rel="icon" href="/projects/a149191c-6a9a-4ef7-91e2-af51ef13d640/assets/grain-logo.png">
<link rel="stylesheet" href="app.css">
<link rel="stylesheet" href="settings.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Desktop.jsx"></script>

<script type="text/babel">
const DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "wrapInMacChrome": true
}/*EDITMODE-END*/;

function App() {
  const [t, setT] = useTweaks(DEFAULTS);

  React.useEffect(() => {
    document.body.classList.toggle('density-compact', t.density === 'compact');
  }, [t.density]);

  React.useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  });

  const inner = (
    <div className="gr-app" style={{ height: '100%', minHeight: 0 }}>
      <Sidebar active="preferences" onNav={() => {}} />
      <main className="gr-main">
        <div data-screen-label="Preferences › Desktop notifications">
          <DesktopNotifications />
        </div>
      </main>
    </div>
  );

  return (
    <>
      {t.wrapInMacChrome ? (
        <div className="mac-shell">
          <div className="mac-shell__window">
            <div className="mac-titlebar">
              <div className="mac-traffic"><span /><span /><span /></div>
              <div className="mac-titlebar__title">Settings — Grain</div>
            </div>
            <div className="mac-body">{inner}</div>
          </div>
        </div>
      ) : (
        <div style={{ minHeight: '100vh' }}>{inner}</div>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Presentation">
          <TweakRadio
            label="Density"
            value={t.density}
            onChange={(v) => setT('density', v)}
            options={[
              { value: 'comfortable', label: 'Cozy' },
              { value: 'compact', label: 'Compact' },
            ]}
          />
          <TweakToggle
            label="Mac chrome"
            value={t.wrapInMacChrome}
            onChange={(v) => setT('wrapInMacChrome', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
